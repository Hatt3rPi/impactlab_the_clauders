site_name: The Clauders — Claude Impact Lab Chile 2026
site_description: Wiki interna del equipo The Clauders para el Claude Impact Lab Chile 2026 — El puente al ciudadano.
site_author: The Clauders
site_url: https://theclauders.netlify.app/

repo_name: Hatt3rPi/impactlab_the_clauders
repo_url: https://github.com/Hatt3rPi/impactlab_the_clauders
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: es
  - tags
  - awesome-pages
  - git-revision-date-localized:
      type: date
      timezone: America/Santiago
      locale: es
      fallback_to_build_date: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hatt3rPi/impactlab_the_clauders
    - icon: fontawesome/solid/globe
      link: https://fintech.benditaia.cl/es
      name: Sitio oficial de la competencia

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/diagram-fullscreen.js

